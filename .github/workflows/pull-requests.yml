name: Pull requests

on:
  pull_request:

permissions:
  contents: read

env:
  # Among other things, opts out of Turborepo telemetry
  # See https://consoledonottrack.com/
  DO_NOT_TRACK: '1'
  # Some tasks slow down considerably on GitHub Actions runners when concurrency is high
  TURBO_CONCURRENCY: 1
  # Enables Turborepo Remote Caching.
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Needed for grouping check-web3 strategies into one check for mergify
  all-web3-checks:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - run: echo "Done"

  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node:
          - 'lts/krypton'

    name: Build & Test on Node ${{ matrix.node }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies
        with:
          version: ${{ matrix.node }}

      - name: Setup Solana Test Validator
        id: start-test-validator
        uses: ./.github/actions/setup-validator

      - name: Build & Test
        run: pnpm build # Don't add --concurrency here; it's already baked in

      - name: Test Expo Examples
        run: |
          pnpm --dir examples/expo-kit test
          pnpm --dir examples/expo-web3js test

      - name: Smoke Test Expo Native Entries
        run: pnpm test:examples:native-entry

      - name: Lint Expo Examples
        run: |
          pnpm --dir examples/expo-kit lint
          pnpm --dir examples/expo-web3js lint

      - name: Stop Test Validator
        if: always() && steps.start-test-validator.outcome == 'success'
        run: kill ${{ steps.start-test-validator.outputs.pid }}
